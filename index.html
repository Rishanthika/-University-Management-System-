<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UniSphere — University Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body class="login-page">

<div class="login-split">
  <!-- LEFT BRAND PANEL -->
  <div class="brand-panel">
    <div class="brand-inner">
      <div class="brand-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">UniSphere</span>
      </div>
      <h1 class="brand-tagline">Manage. Track.<br/>Excel.</h1>
      <p class="brand-sub">A unified platform for academic administration, attendance, and records.</p>
      <div class="brand-stats">
        <div class="stat"><span class="stat-num">3</span><span class="stat-label">Role Levels</span></div>
        <div class="stat"><span class="stat-num">∞</span><span class="stat-label">Records</span></div>
        <div class="stat"><span class="stat-num">RT</span><span class="stat-label">Real-Time</span></div>
      </div>
    </div>
    <div class="brand-bg-shape"></div>
  </div>

  <!-- RIGHT LOGIN FORM -->
  <div class="login-panel">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <!-- DEMO ROLE SWITCHER -->
      <div class="demo-roles">
        <span class="demo-label">Demo login as:</span>
        <div class="role-pills">
          <button class="role-pill active" data-role="admin" onclick="fillDemo('admin',this)">Admin</button>
          <button class="role-pill" data-role="staff" onclick="fillDemo('staff',this)">Teacher</button>
          <button class="role-pill" data-role="student" onclick="fillDemo('student',this)">Student</button>
        </div>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@university.edu" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="loginPassword" placeholder="••••••••" required/>
            <button type="button" class="pw-toggle" onclick="togglePw()">👁</button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox"/> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary btn-login">
          <span>Sign In</span>
          <span class="btn-arrow">→</span>
        </button>
      </form>

      <div class="login-footer">
        <p>UniSphere v2.0 &nbsp;·&nbsp; 2024</p>
      </div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
